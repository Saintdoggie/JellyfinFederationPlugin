<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Jellyfin Federation Configuration</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; background: #101010; color: #fff; }
        .error { color: #f44; padding: 15px; background: rgba(255,68,68,0.1); border-radius: 6px; margin: 20px 0; }
        .section { margin: 30px 0; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 8px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 20px; margin: 10px 5px 10px 0; background: #00a4dc; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0288bb; }
        button.remove { background: #c44; }
        button.remove:hover { background: #a22; }
        button.success { background: #52b54b; }
        h2, h3 { margin-top: 0; }
        label { display: block; margin: 10px 0 5px; opacity: 0.8; font-size: 0.9em; }
        .warning { padding: 10px; background: rgba(255,153,0,0.15); border-left: 3px solid #f90; border-radius: 4px; margin: 15px 0; font-size: 0.9em; }
        .diagnostic { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-top: 15px; }
        .diagnostic div { padding: 12px; background: rgba(255,255,255,0.04); border-radius: 6px; }
        .diagnostic strong { display: block; font-size: 0.85em; opacity: 0.7; margin-bottom: 4px; }
        code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Jellyfin Federation Configuration</h1>
    <div id="errorContainer"></div>
    <div id="statusContainer" style="padding:10px; background:rgba(82,181,75,0.2); border-radius:6px; margin:20px 0;"></div>

    <div class="section">
        <h2>Diagnostics</h2>
        <div id="diagnostics" class="diagnostic">
            <div><strong>Loading...</strong></div>
        </div>
        <div style="margin-top:15px;">
            <button type="button" id="btnRefreshCache" class="success">Refresh Cache Now</button>
            <button type="button" id="btnProvision">Provision Libraries</button>
            <button type="button" id="btnTestAll">Test All Servers</button>
            <button type="button" id="btnRefreshDiag">Refresh Diagnostics</button>
        </div>
    </div>

    <form id="configForm">
        <div class="section">
            <h2>General</h2>
            <label>Local Server URL (auto-detected, overridable):</label>
            <input type="text" id="txtServerUrl" placeholder="http://your-jellyfin:8096" />
            <label>Cache Path (blank = plugin data dir):</label>
            <input type="text" id="txtCachePath" placeholder="Default" />
            <label><input type="checkbox" id="chkAutoProvision" /> Auto-provision libraries</label>
            <label><input type="checkbox" id="chkDedup" /> Enable deduplication by provider ID</label>
            <label>Dedup Provider IDs (comma-separated):</label>
            <input type="text" id="txtDedupIds" placeholder="imdb,tmdb,tvdb" />
            <label>Refresh interval (hours):</label>
            <input type="number" id="txtRefreshHours" min="1" max="168" />
        </div>

        <div class="section">
            <h2>Remote Servers</h2>
            <div id="serverList"></div>
            <button type="button" id="btnAddServer">Add Server</button>
        </div>

        <div class="section">
            <h2>Library Mappings</h2>
            <div id="mappingList"></div>
            <button type="button" id="btnAddMapping">Add Mapping</button>
        </div>

        <div class="section">
            <button type="submit" id="btnSave">Save Configuration</button>
        </div>
    </form>

    <script>
    (function() {
        'use strict';

        var apiBase = window.location.origin;
        var currentConfig = { RemoteServers: [], LibraryMappings: [] };

        function setStatus(msg, isError) {
            var el = document.getElementById('statusContainer');
            el.textContent = msg;
            el.style.background = isError ? 'rgba(255,68,68,0.2)' : 'rgba(82,181,75,0.2)';
        }

        function showError(msg) {
            document.getElementById('errorContainer').innerHTML = '<div class="error">' + escapeHtml(msg) + '</div>';
        }

        function escapeHtml(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function generateGuid() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        function renderServers() {
            var c = document.getElementById('serverList');
            var s = currentConfig.RemoteServers || [];
            if (s.length === 0) { c.innerHTML = '<p style="opacity:0.6;">No servers configured.</p>'; return; }
            var html = '';
            s.forEach(function(server, i) {
                html += '<div class="section" style="background:rgba(255,255,255,0.05);margin:15px 0;">';
                html += '<h3>Server ' + (i + 1) + '</h3>';
                html += '<label>Name:</label><input type="text" class="srvName" data-i="' + i + '" value="' + escapeHtml(server.Name) + '" />';
                html += '<label>URL:</label><input type="text" class="srvUrl" data-i="' + i + '" value="' + escapeHtml(server.Url) + '" placeholder="http://server:8096" />';
                html += '<label>API Key:</label><input type="password" class="srvKey" data-i="' + i + '" value="' + escapeHtml(server.ApiKey) + '" />';
                html += '<label>User ID (blank = first user):</label><input type="text" class="srvUser" data-i="' + i + '" value="' + escapeHtml(server.UserId) + '" />';
                html += '<label>Streaming Mode:</label><select class="srvMode" data-i="' + i + '">';
                html += '<option value="Direct"' + (server.StreamingMode !== 1 ? ' selected' : '') + '>Direct (302 redirect)</option>';
                html += '<option value="Proxy"' + (server.StreamingMode === 1 ? ' selected' : '') + '>Proxy (hides API key)</option>';
                html += '</select>';
                html += '<label>Priority (lower = preferred source):</label><input type="number" class="srvPri" data-i="' + i + '" value="' + (server.Priority || 0) + '" />';
                html += '<label><input type="checkbox" class="srvImgKey" data-i="' + i + '" ' + (server.RequireApiKeyForImages ? 'checked' : '') + ' /> Require api_key for image fetches</label>';
                html += '<label><input type="checkbox" class="srvEnabled" data-i="' + i + '" ' + (server.Enabled !== false ? 'checked' : '') + ' /> Enabled</label>';
                html += '<div style="margin-top:10px;">';
                html += '<button type="button" class="btnTest" data-i="' + i + '">Test</button>';
                html += '<button type="button" class="remove btnRemoveServer" data-i="' + i + '">Remove</button>';
                html += '</div>';
                html += '<div id="srvStatus' + i + '" style="margin-top:10px;display:none;"></div>';
                html += '</div>';
            });
            c.innerHTML = html;
        }

        function renderMappings() {
            var c = document.getElementById('mappingList');
            var m = currentConfig.LibraryMappings || [];
            if (m.length === 0) { c.innerHTML = '<p style="opacity:0.6;">No mappings configured.</p>'; return; }
            var html = '';
            m.forEach(function(mp, i) {
                html += '<div class="section" style="background:rgba(255,255,255,0.05);margin:15px 0;">';
                html += '<h3>Mapping ' + (i + 1) + '</h3>';
                html += '<label>Library Name (shown in Jellyfin):</label>';
                html += '<input type="text" class="mapName" data-i="' + i + '" value="' + escapeHtml(mp.LocalLibraryName) + '" />';
                html += '<label>Media Type:</label><select class="mapType" data-i="' + i + '">';
                ['Movie','Series','Season','Episode','MusicAlbum','Audio','MusicVideo','Book','Photo','PhotoAlbum','Video','Playlist','BoxSet'].forEach(function(t) {
                    html += '<option value="' + t + '"' + (mp.MediaType === t ? ' selected' : '') + '>' + t + '</option>';
                });
                html += '</select>';
                html += '<label><input type="checkbox" class="mapAuto" data-i="' + i + '" ' + (mp.AutoProvision !== false ? 'checked' : '') + ' /> Auto-provision library</label>';
                html += '<label><input type="checkbox" class="mapEnabled" data-i="' + i + '" ' + (mp.Enabled !== false ? 'checked' : '') + ' /> Enabled</label>';
                html += '<div style="margin-top:10px;"><button type="button" class="btnBrowse" data-i="' + i + '">Browse Remote Libraries</button></div>';
                html += '<div id="mapLibs' + i + '" style="margin-top:10px;"></div>';
                if (mp.RemoteLibrarySources && mp.RemoteLibrarySources.length > 0) {
                    html += '<div style="margin-top:10px;padding:10px;background:rgba(82,181,75,0.1);border-radius:4px;">';
                    html += '<strong>Selected (' + mp.RemoteLibrarySources.length + '):</strong><ul style="margin:5px 0;padding-left:20px;">';
                    mp.RemoteLibrarySources.forEach(function(src) {
                        html += '<li>' + escapeHtml(src.ServerName) + ' → ' + escapeHtml(src.RemoteLibraryName) + '</li>';
                    });
                    html += '</ul></div>';
                }
                html += '<button type="button" class="remove btnRemoveMapping" data-i="' + i + '" style="margin-top:10px;">Remove</button>';
                html += '</div>';
            });
            c.innerHTML = html;
        }

        function collectFormData() {
            (currentConfig.RemoteServers || []).forEach(function(s, i) {
                var n = document.querySelector('.srvName[data-i="' + i + '"]');
                var u = document.querySelector('.srvUrl[data-i="' + i + '"]');
                var k = document.querySelector('.srvKey[data-i="' + i + '"]');
                var ui = document.querySelector('.srvUser[data-i="' + i + '"]');
                var m = document.querySelector('.srvMode[data-i="' + i + '"]');
                var p = document.querySelector('.srvPri[data-i="' + i + '"]');
                var ik = document.querySelector('.srvImgKey[data-i="' + i + '"]');
                var e = document.querySelector('.srvEnabled[data-i="' + i + '"]');
                if (n) s.Name = n.value;
                if (u) s.Url = u.value;
                if (k) s.ApiKey = k.value;
                if (ui) s.UserId = ui.value;
                if (m) s.StreamingMode = m.value === 'Proxy' ? 1 : 0;
                if (p) s.Priority = parseInt(p.value) || 0;
                if (ik) s.RequireApiKeyForImages = ik.checked;
                if (e) s.Enabled = e.checked;
            });
            (currentConfig.LibraryMappings || []).forEach(function(mp, i) {
                var n = document.querySelector('.mapName[data-i="' + i + '"]');
                var t = document.querySelector('.mapType[data-i="' + i + '"]');
                var a = document.querySelector('.mapAuto[data-i="' + i + '"]');
                var en = document.querySelector('.mapEnabled[data-i="' + i + '"]');
                if (n) mp.LocalLibraryName = n.value;
                if (t) mp.MediaType = t.value;
                if (a) mp.AutoProvision = a.checked;
                if (en) mp.Enabled = en.checked;
            });

            currentConfig.ServerUrl = document.getElementById('txtServerUrl').value;
            currentConfig.CachePath = document.getElementById('txtCachePath').value;
            currentConfig.AutoProvisionLibraries = document.getElementById('chkAutoProvision').checked;
            currentConfig.EnableDedup = document.getElementById('chkDedup').checked;
            currentConfig.DedupProviderIds = document.getElementById('txtDedupIds').value
                .split(',').map(function(s){return s.trim();}).filter(Boolean);
            currentConfig.RefreshIntervalHours = parseInt(document.getElementById('txtRefreshHours').value) || 1;
        }

        function saveConfiguration() {
            setStatus('Saving...');
            collectFormData();
            fetch(apiBase + '/Plugins/Federation/Configuration', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(currentConfig)
            })
            .then(function(r) { return r.ok ? r.json() : r.text().then(function(t){throw new Error(t);}); })
            .then(function() { setStatus('Configuration saved!'); loadDiagnostics(); })
            .catch(function(e) { showError('Save failed: ' + e.message); });
        }

        function testServer(i) {
            var s = currentConfig.RemoteServers[i];
            var st = document.getElementById('srvStatus' + i);
            st.style.display = 'block';
            st.style.background = 'rgba(0,164,220,0.2)';
            st.textContent = 'Testing...';
            fetch(apiBase + '/Plugins/Federation/TestServer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(s)
            })
            .then(function(r){return r.json();})
            .then(function(res) {
                if (res.success) {
                    st.style.background = 'rgba(82,181,75,0.2)';
                    st.innerHTML = '<strong>OK</strong>: ' + escapeHtml(res.serverInfo.name) + ' v' + escapeHtml(res.serverInfo.version);
                    if (res.serverInfo.suggestedUserId && !s.UserId) {
                        s.UserId = res.serverInfo.suggestedUserId;
                        renderServers();
                    }
                } else {
                    st.style.background = 'rgba(255,68,68,0.2)';
                    st.textContent = 'Failed: ' + res.message;
                }
            })
            .catch(function(e){st.textContent = 'Error: ' + e.message;});
        }

        function browseLibraries(i) {
            var c = document.getElementById('mapLibs' + i);
            c.innerHTML = '<p>Loading...</p>';
            fetch(apiBase + '/Plugins/Federation/GetRemoteLibraries')
            .then(function(r){return r.json();})
            .then(function(res) {
                if (!res.success || !res.servers) { c.innerHTML = '<p style="color:#f90;">No servers available.</p>'; return; }
                var mp = currentConfig.LibraryMappings[i];
                if (!mp.RemoteLibrarySources) mp.RemoteLibrarySources = [];
                var html = '<div style="max-height:300px;overflow-y:auto;border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:10px;">';
                res.servers.forEach(function(srv) {
                    html += '<strong>' + escapeHtml(srv.serverName) + '</strong>';
                    if (srv.error) { html += '<div style="color:#f44;">' + escapeHtml(srv.error) + '</div>'; }
                    (srv.libraries || []).forEach(function(lib) {
                        var checked = mp.RemoteLibrarySources.some(function(x){return x.ServerId===srv.serverId && x.RemoteLibraryId===lib.id;});
                        html += '<label><input type="checkbox" class="chkLib" data-mi="' + i + '" data-sid="' + escapeHtml(srv.serverId) + '" data-sname="' + escapeHtml(srv.serverName) + '" data-lid="' + escapeHtml(lib.id) + '" data-lname="' + escapeHtml(lib.name) + '" ' + (checked?'checked':'') + ' /> ' + escapeHtml(lib.name) + ' (' + lib.collectionType + ', ' + (lib.itemCount||0) + ')</label>';
                    });
                });
                html += '</div><button type="button" class="btnApply" data-i="' + i + '" style="margin-top:10px;">Apply</button>';
                c.innerHTML = html;
            })
            .catch(function(e){c.innerHTML = '<p style="color:#f44;">' + escapeHtml(e.message) + '</p>';});
        }

        function applyLibraries(i) {
            var mp = currentConfig.LibraryMappings[i];
            var selected = [];
            document.querySelectorAll('.chkLib[data-mi="' + i + '"]:checked').forEach(function(cb) {
                selected.push({
                    ServerId: cb.getAttribute('data-sid'),
                    ServerName: cb.getAttribute('data-sname'),
                    RemoteLibraryId: cb.getAttribute('data-lid'),
                    RemoteLibraryName: cb.getAttribute('data-lname')
                });
            });
            mp.RemoteLibrarySources = selected;
            renderMappings();
        }

        function loadDiagnostics() {
            fetch(apiBase + '/Plugins/Federation/SystemInfo')
            .then(function(r){return r.json();})
            .then(function(d) {
                var el = document.getElementById('diagnostics');
                el.innerHTML =
                    '<div><strong>Local Server URL</strong>' + escapeHtml(d.detectedUrl || 'not set') + '</div>' +
                    '<div><strong>Cache Path</strong>' + escapeHtml(d.cachePath || 'default') + '</div>' +
                    '<div><strong>Cache Entries</strong>' + (d.cacheEntries || 0) + '</div>' +
                    '<div><strong>Last Refresh</strong>' + (d.lastRefresh ? new Date(d.lastRefresh).toLocaleString() : 'Never') + '</div>' +
                    '<div><strong>Auto-Provision</strong>' + (d.autoProvisionLibraries ? 'Yes' : 'No') + '</div>' +
                    '<div><strong>Dedup</strong>' + (d.enableDedup ? 'On (' + (d.dedupProviderIds||[]).join(',') + ')' : 'Off') + '</div>' +
                    '<div><strong>Refresh Interval</strong>' + (d.refreshIntervalHours || 1) + 'h</div>';
            })
            .catch(function(e){
                document.getElementById('diagnostics').innerHTML = '<div><strong>Error</strong>' + escapeHtml(e.message) + '</div>';
            });
        }

        function loadConfiguration() {
            setStatus('Loading...');
            fetch(apiBase + '/Plugins/Federation/Configuration')
            .then(function(r){return r.json();})
            .then(function(c) {
                currentConfig = c || { RemoteServers: [], LibraryMappings: [] };
                document.getElementById('txtServerUrl').value = currentConfig.ServerUrl || '';
                document.getElementById('txtCachePath').value = currentConfig.CachePath || '';
                document.getElementById('chkAutoProvision').checked = currentConfig.AutoProvisionLibraries !== false;
                document.getElementById('chkDedup').checked = currentConfig.EnableDedup !== false;
                document.getElementById('txtDedupIds').value = (currentConfig.DedupProviderIds || ['imdb','tmdb','tvdb']).join(',');
                document.getElementById('txtRefreshHours').value = currentConfig.RefreshIntervalHours || 1;
                renderServers();
                renderMappings();
                attachHandlers();
                loadDiagnostics();
                setStatus('Ready');
            })
            .catch(function(e){showError('Load failed: ' + e.message);});
        }

        function attachHandlers() {
            document.getElementById('btnAddServer').onclick = function() {
                currentConfig.RemoteServers.push({Id: generateGuid(), Name:'', Url:'', ApiKey:'', UserId:'', Enabled:true, StreamingMode:0, Priority:0});
                renderServers();
            };
            document.getElementById('btnAddMapping').onclick = function() {
                currentConfig.LibraryMappings.push({LocalLibraryName:'', MediaType:'Movie', RemoteServerIds:[], RemoteLibrarySources:[], Enabled:true, AutoProvision:true});
                renderMappings();
            };
            document.getElementById('btnSave').onclick = function(e){e.preventDefault(); saveConfiguration();};
            document.getElementById('btnRefreshCache').onclick = function() {
                setStatus('Refreshing cache...');
                fetch(apiBase + '/Plugins/Federation/Refresh', {method:'POST'})
                .then(function(r){return r.json();})
                .then(function(res){setStatus(res.Message || 'Done'); loadDiagnostics();})
                .catch(function(e){showError('Refresh failed: ' + e.message);});
            };
            document.getElementById('btnProvision').onclick = function() {
                fetch(apiBase + '/Plugins/Federation/ProvisionLibraries', {method:'POST'})
                .then(function(r){return r.json();})
                .then(function(res){setStatus(res.message || 'Provisioned');})
                .catch(function(e){showError('Provision failed: ' + e.message);});
            };
            document.getElementById('btnTestAll').onclick = function() {
                fetch(apiBase + '/Plugins/Federation/TestAllServers', {method:'POST'})
                .then(function(r){return r.json();})
                .then(function(res){setStatus('Tested ' + (res.results||[]).length + ' servers');})
                .catch(function(e){showError('Test failed: ' + e.message);});
            };
            document.getElementById('btnRefreshDiag').onclick = loadDiagnostics;

            document.body.addEventListener('click', function(e) {
                var t = e.target.closest('.btnRemoveServer,.btnRemoveMapping,.btnTest,.btnBrowse,.btnApply');
                if (!t) return;
                e.preventDefault();
                if (t.classList.contains('btnRemoveServer')) {
                    currentConfig.RemoteServers.splice(parseInt(t.getAttribute('data-i')),1);
                    renderServers();
                } else if (t.classList.contains('btnRemoveMapping')) {
                    currentConfig.LibraryMappings.splice(parseInt(t.getAttribute('data-i')),1);
                    renderMappings();
                } else if (t.classList.contains('btnTest')) {
                    testServer(parseInt(t.getAttribute('data-i')));
                } else if (t.classList.contains('btnBrowse')) {
                    browseLibraries(parseInt(t.getAttribute('data-i')));
                } else if (t.classList.contains('btnApply')) {
                    applyLibraries(parseInt(t.getAttribute('data-i')));
                }
            });
        }

        loadConfiguration();
    })();
    </script>
</body>
</html>
